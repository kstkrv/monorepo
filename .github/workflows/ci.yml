name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package: [shared, server, client, orchestrator]

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.14.0"
          rebar3-version: "3"

      - name: Build and test ${{ matrix.package }}
        working-directory: apps/${{ matrix.package }}
        run: |
          gleam build
          gleam test
