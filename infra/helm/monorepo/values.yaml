replicaCount: 1

namespace: monorepo

image:
  repository: ghcr.io/kstkrv/monorepo
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: monorepo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  CLIENT_JS_PATH: /app/client.mjs

resources: {}

e2e:
  image:
    repository: ghcr.io/kstkrv/monorepo-e2e
    tag: latest
    pullPolicy: Always

orchestratorE2e:
  enabled: false
  openrouterApiKey: ""
  image:
    repository: ghcr.io/kstkrv/monorepo-e2e-orchestrator
    tag: latest
    pullPolicy: Always
