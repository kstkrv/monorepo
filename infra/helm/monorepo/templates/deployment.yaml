apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "monorepo.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monorepo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "monorepo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "monorepo.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: CLIENT_JS_PATH
              value: {{ .Values.env.CLIENT_JS_PATH | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
