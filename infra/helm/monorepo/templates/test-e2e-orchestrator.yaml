{{- if .Values.orchestratorE2e.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "monorepo.fullname" . }}-e2e-orchestrator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monorepo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "monorepo.name" . }}-e2e-orchestrator
    spec:
      restartPolicy: Never
      containers:
        - name: e2e-orchestrator
          image: "{{ .Values.orchestratorE2e.image.repository }}:{{ .Values.orchestratorE2e.image.tag }}"
          imagePullPolicy: {{ .Values.orchestratorE2e.image.pullPolicy }}
          {{- if .Values.orchestratorE2e.openrouterApiKey }}
          env:
            - name: OPENROUTER_API_KEY
              value: {{ .Values.orchestratorE2e.openrouterApiKey | quote }}
          {{- end }}
{{- end }}
