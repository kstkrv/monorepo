apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "monorepo.fullname" . }}-e2e-test
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monorepo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "monorepo.name" . }}-e2e
    spec:
      restartPolicy: Never
      containers:
        - name: e2e
          image: "{{ .Values.e2e.image.repository }}:{{ .Values.e2e.image.tag }}"
          imagePullPolicy: {{ .Values.e2e.image.pullPolicy }}
          env:
            - name: E2E_BASE_URL
              value: "http://{{ include "monorepo.fullname" . }}:{{ .Values.service.port }}"
