apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monorepo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kstkrv/monorepo.git
    targetRevision: main
    path: infra/helm/monorepo
  destination:
    server: https://kubernetes.default.svc
    namespace: monorepo
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
